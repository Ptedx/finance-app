name: Deploy Spendr API

on:
  push:
    branches:
      - main
    # Este repositorio guarda o app e o backend juntos. Sem o filtro, um commit que so
    # mexe numa tela do React Native reconstruiria e reiniciaria a API em producao --
    # downtime por uma mudanca que nem chega perto do servidor.
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  # Permite disparar pela aba Actions, para redeploy sem precisar de um commit vazio.
  workflow_dispatch:

# Dois deploys simultaneos brigariam pelo mesmo diretorio e pelas mesmas portas na VM.
# O segundo espera o primeiro terminar em vez de atropela-lo.
concurrency:
  group: deploy-spendr-api
  cancel-in-progress: false

# Config que nao e segredo mora aqui, e nao nos secrets: fica versionada, revisavel num
# diff e editavel sem sair do editor. So o que vaza valor se exposto vira secret.
env:
  # Relativo ao home do usuario `ubuntu`: guardar "~/spendr" nao funcionaria, porque o
  # til nao e expandido quando a variavel e usada entre aspas no shell remoto.
  DEPLOY_DIR: spendr
  POSTGRES_USER: spendr_user
  POSTGRES_DB: spendr_db
  API_PORT: 3009
  HOST_PORT: 3012
  ACCESS_TOKEN_TTL: 15m
  REFRESH_TOKEN_DAYS: 30
  SYNC_PAGE_SIZE: 500
  # Vazio = qualquer origem, que e o correto para um app nativo: o React Native nao
  # manda header Origin e nao ha navegador para proteger. Preencher so se houver front web.
  CORS_ORIGINS: ''
  PUBLIC_URL: https://api-finance.valtre.com.br

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          # script_stop faz o shell abortar no primeiro comando que falhar. Sem isso, um
          # git reset com problema seguiria adiante e o job terminaria verde tendo
          # publicado o codigo antigo.
          script_stop: true
          # Os valores chegam como variaveis de ambiente da sessao SSH, em vez de serem
          # interpolados no texto do script. Assim uma senha com aspas ou cifrao nao vira
          # comando: o shell recebe o valor pronto, sem reinterpreta-lo.
          #
          # O script abaixo e ASCII puro de proposito: o ssh-action transporta o texto
          # por um canal que corrompe multibyte, e um acento antes de um ';' vira erro de
          # sintaxe no shell remoto. Nao reintroduza acentos aqui.
          envs: DEPLOY_DIR,POSTGRES_USER,POSTGRES_DB,API_PORT,HOST_PORT,ACCESS_TOKEN_TTL,REFRESH_TOKEN_DAYS,SYNC_PAGE_SIZE,CORS_ORIGINS,JWT_SECRET,POSTGRES_PASSWORD
          script: |
            set -euo pipefail

            echo "==> Conferindo os segredos"
            [ -n "${JWT_SECRET:-}" ]        || { echo "ERRO: secret JWT_SECRET nao definido"; exit 1; }
            [ -n "${POSTGRES_PASSWORD:-}" ] || { echo "ERRO: secret POSTGRES_PASSWORD nao definido"; exit 1; }

            # Lista de permitidos, nao de proibidos. Estes dois valores atravessam tres
            # parsers com regras diferentes: o do .env, o do docker compose (que expande
            # $VAR) e o de URL do Postgres (onde @ : / ? # tem significado). Enumerar
            # tudo que quebra em algum deles e como errar; aceitar so o seguro nos tres,
            # nao. [A-Za-z0-9_.~-] sao os caracteres "unreserved" de URI.
            validar_segredo() {
              nome="$1"
              valor="$2"
              case "$valor" in
                *[!A-Za-z0-9_.~-]*)
                  echo "ERRO: $nome tem caractere fora de [A-Za-z0-9_.~-]."
                  echo "      Gere assim: node -e \"console.log(require('crypto').randomBytes(64).toString('base64').replace(/[^A-Za-z0-9]/g,'').slice(0,48))\""
                  exit 1
                  ;;
              esac
              if [ "${#valor}" -lt 16 ]; then
                echo "ERRO: $nome tem menos de 16 caracteres"
                exit 1
              fi
            }

            validar_segredo POSTGRES_PASSWORD "$POSTGRES_PASSWORD"
            validar_segredo JWT_SECRET "$JWT_SECRET"

            echo "==> Atualizando o codigo"
            cd "$HOME/$DEPLOY_DIR"
            git fetch origin main
            git reset --hard origin/main

            cd backend

            echo "==> Escrevendo o .env"
            # umask antes de criar: o arquivo nasce 600, sem janela em que outro usuario
            # da VM pudesse le-lo. O chmod cobre o caso de o arquivo ja existir.
            umask 077
            # Cada valor vem de uma variavel de ambiente via printf, nunca interpolado no
            # texto do script: uma senha com $, aspas ou crase entra literal.
            {
              printf 'NODE_ENV=production\n'
              printf 'PORT=%s\n'               "$API_PORT"
              printf 'POSTGRES_USER=%s\n'      "$POSTGRES_USER"
              printf 'POSTGRES_PASSWORD=%s\n'  "$POSTGRES_PASSWORD"
              printf 'POSTGRES_DB=%s\n'        "$POSTGRES_DB"
              # Derivado das partes acima, e nao um segredo proprio: impossivel trocar a
              # senha num lugar e esquecer no outro. Host `postgres`, o nome do servico no
              # compose -- nao 127.0.0.1.
              printf 'DATABASE_URL=postgresql://%s:%s@postgres:5432/%s?schema=public\n' \
                "$POSTGRES_USER" "$POSTGRES_PASSWORD" "$POSTGRES_DB"
              printf 'JWT_SECRET=%s\n'         "$JWT_SECRET"
              printf 'ACCESS_TOKEN_TTL=%s\n'   "$ACCESS_TOKEN_TTL"
              printf 'REFRESH_TOKEN_DAYS=%s\n' "$REFRESH_TOKEN_DAYS"
              printf 'SYNC_PAGE_SIZE=%s\n'     "$SYNC_PAGE_SIZE"
              printf 'CORS_ORIGINS=%s\n'       "$CORS_ORIGINS"
            } > .env
            chmod 600 .env

            echo "==> Subindo os containers"
            # Sem `down`: o compose recria so os servicos cujo build mudou, entao o
            # Postgres nao cai a cada deploy. As migrations rodam sozinhas na subida da
            # API (prisma migrate deploy no CMD do Dockerfile).
            docker compose up -d --build

            echo "==> Aguardando a API responder"
            for tentativa in $(seq 1 30); do
              if curl -fsS "http://localhost:${HOST_PORT}/health" > /dev/null 2>&1; then
                echo "API no ar apos ${tentativa} tentativa(s)"
                curl -fsS "http://localhost:${HOST_PORT}/health"
                echo
                docker image prune -f > /dev/null 2>&1 || true
                exit 0
              fi
              sleep 2
            done

            # Container subiu mas a API nao respondeu em 60s. Os logs vao para o output do
            # job, que e onde alguem vai procurar.
            echo "ERRO: /health nao respondeu em 60s"
            docker compose ps
            docker compose logs --tail 80 api
            exit 1
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      - name: Verificar pelo dominio publico
        # Confirma o caminho inteiro -- DNS, nginx, TLS e API --, e nao so o localhost da
        # VM. Um deploy que so funciona por dentro nao serve para o app.
        run: |
          for tentativa in $(seq 1 10); do
            if curl -fsS "${PUBLIC_URL}/health"; then
              echo
              echo "Deploy confirmado em ${PUBLIC_URL}"
              exit 0
            fi
            sleep 3
          done
          echo "ERRO: a API nao respondeu em ${PUBLIC_URL}/health"
          exit 1
