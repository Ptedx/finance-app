name: Deploy Spendr API

on:
  push:
    branches:
      - main
    # Este repositório guarda o app e o backend juntos. Sem o filtro, um commit que só
    # mexe numa tela do React Native reconstruiria e reiniciaria a API em produção —
    # downtime por uma mudança que nem chega perto do servidor.
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  # Permite disparar pela aba Actions, para redeploy sem precisar de um commit vazio.
  workflow_dispatch:

# Dois deploys simultâneos brigariam pelo mesmo diretório e pelas mesmas portas na VM.
# O segundo espera o primeiro terminar em vez de atropelá-lo.
concurrency:
  group: deploy-spendr-api
  cancel-in-progress: false

# Configuração que não é segredo mora aqui, e não nos secrets: fica versionada, revisável
# num diff e editável sem sair do editor. Só o que vaza valor se exposto vira secret.
env:
  # Relativo ao home do usuário `ubuntu`: guardar "~/spendr" aqui não funcionaria, porque
  # o til não é expandido quando a variável é usada entre aspas no shell remoto.
  DEPLOY_DIR: spendr
  POSTGRES_USER: spendr_user
  POSTGRES_DB: spendr_db
  API_PORT: 3009
  HOST_PORT: 3012
  ACCESS_TOKEN_TTL: 15m
  REFRESH_TOKEN_DAYS: 30
  SYNC_PAGE_SIZE: 500
  # Vazio = qualquer origem, que é o correto para um app nativo: o React Native não
  # manda header Origin e não há navegador para proteger. Preencher só se houver front web.
  CORS_ORIGINS: ''
  PUBLIC_URL: https://api-finance.valtre.com.br

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          # `script_stop` faz o shell abortar no primeiro comando que falhar. Sem isso,
          # um `git reset` com problema seguiria adiante e o job terminaria verde tendo
          # publicado o código antigo.
          script_stop: true
          # Os valores chegam como variáveis de ambiente da sessão SSH, em vez de serem
          # interpolados no texto do script. Assim uma senha com aspas ou cifrão não vira
          # comando: o shell recebe o valor pronto, sem reinterpretá-lo.
          envs: DEPLOY_DIR,POSTGRES_USER,POSTGRES_DB,API_PORT,HOST_PORT,ACCESS_TOKEN_TTL,REFRESH_TOKEN_DAYS,SYNC_PAGE_SIZE,CORS_ORIGINS,JWT_SECRET,POSTGRES_PASSWORD
          script: |
            set -euo pipefail

            echo "==> Conferindo os segredos"
            [ -n "${JWT_SECRET:-}" ]       || { echo "ERRO: secret JWT_SECRET nao esta definido"; exit 1; }
            [ -n "${POSTGRES_PASSWORD:-}" ] || { echo "ERRO: secret POSTGRES_PASSWORD nao esta definido"; exit 1; }

            # Lista de permitidos, não de proibidos.
            #
            # Estes dois valores atravessam três parsers com regras diferentes: o do
            # .env, o de interpolação do docker compose (que expande $VAR) e o de URL
            # do Postgres (onde @ : / ? # têm significado). Enumerar tudo que quebra em
            # algum deles é como errar; aceitar só o que é seguro nos três, não.
            # `A-Za-z0-9_.~-` são exatamente os caracteres "unreserved" de URI.
            validar_segredo() {
              local nome="$1" valor="$2"
              case "$valor" in
                *[!A-Za-z0-9_.~-]*)
                  echo "ERRO: $nome contem caractere fora de [A-Za-z0-9_.~-]."
                  echo "      Esses caracteres quebram a URL do Postgres ou a"
                  echo "      interpolacao do docker compose. Gere assim:"
                  echo "      openssl rand -base64 64 | tr -dc 'A-Za-z0-9' | head -c 48"
                  exit 1
                  ;;
              esac
              [ ${#valor} -ge 16 ] || { echo "ERRO: $nome tem menos de 16 caracteres"; exit 1; }
            }

            validar_segredo POSTGRES_PASSWORD "$POSTGRES_PASSWORD"
            validar_segredo JWT_SECRET        "$JWT_SECRET"

            echo "==> Atualizando o código"
            cd "$HOME/$DEPLOY_DIR"
            git fetch origin main
            git reset --hard origin/main

            cd backend

            echo "==> Escrevendo o .env"
            # umask antes de criar: o arquivo nasce 600, sem uma janela em que outro
            # usuário da VM pudesse lê-lo.
            umask 077
            # Cada valor é escrito com printf a partir de uma variável de ambiente, nunca
            # interpolado no texto do script: uma senha com $, aspas ou crase entra
            # literal em vez de ser reinterpretada pelo shell.
            {
              printf 'NODE_ENV=production\n'
              printf 'PORT=%s\n'                "$API_PORT"
              printf 'POSTGRES_USER=%s\n'       "$POSTGRES_USER"
              printf 'POSTGRES_PASSWORD=%s\n'   "$POSTGRES_PASSWORD"
              printf 'POSTGRES_DB=%s\n'         "$POSTGRES_DB"
              # Derivado das partes acima, em vez de ser um segredo próprio: assim é
              # impossível trocar a senha num lugar e esquecer no outro. O host é
              # `postgres`, o nome do serviço no compose — não 127.0.0.1.
              printf 'DATABASE_URL=postgresql://%s:%s@postgres:5432/%s?schema=public\n' \
                "$POSTGRES_USER" "$POSTGRES_PASSWORD" "$POSTGRES_DB"
              printf 'JWT_SECRET=%s\n'          "$JWT_SECRET"
              printf 'ACCESS_TOKEN_TTL=%s\n'    "$ACCESS_TOKEN_TTL"
              printf 'REFRESH_TOKEN_DAYS=%s\n'  "$REFRESH_TOKEN_DAYS"
              printf 'SYNC_PAGE_SIZE=%s\n'      "$SYNC_PAGE_SIZE"
              printf 'CORS_ORIGINS=%s\n'        "$CORS_ORIGINS"
            } > .env

            # Explícito além do umask: se o arquivo já existia de um deploy anterior, a
            # redireção reaproveita a permissão antiga e o umask não corrige nada.
            chmod 600 .env

            echo "==> Subindo os containers"
            # Sem `down`: o compose recria apenas os serviços cujo build mudou, então o
            # Postgres não é derrubado a cada deploy. As migrations rodam sozinhas na
            # subida da API (`prisma migrate deploy` no CMD do Dockerfile).
            docker compose up -d --build

            echo "==> Aguardando a API responder"
            for tentativa in $(seq 1 30); do
              if curl -fsS "http://localhost:${HOST_PORT}/health" > /dev/null 2>&1; then
                echo "API no ar apos ${tentativa} tentativa(s)"
                curl -fsS "http://localhost:${HOST_PORT}/health"
                echo
                docker image prune -f > /dev/null 2>&1 || true
                exit 0
              fi
              sleep 2
            done

            # Chegar aqui significa que o container subiu mas a API não respondeu em 60s.
            # Os logs vão para o output do job, que é onde alguém vai procurar.
            echo "ERRO: /health nao respondeu em 60s"
            docker compose ps
            docker compose logs --tail 80 api
            exit 1
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      - name: Verificar pelo domínio público
        # Confirma o caminho inteiro — DNS, nginx, TLS e a API —, e não apenas o
        # localhost da VM. Um deploy que só funciona por dentro não serve para o app.
        run: |
          for tentativa in $(seq 1 10); do
            if curl -fsS "${PUBLIC_URL}/health"; then
              echo
              echo "Deploy confirmado em ${PUBLIC_URL}"
              exit 0
            fi
            sleep 3
          done
          echo "ERRO: a API nao respondeu em ${PUBLIC_URL}/health"
          exit 1
