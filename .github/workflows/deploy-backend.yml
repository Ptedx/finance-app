name: Deploy Spendr API

on:
  push:
    branches:
      - main
    # Este repositorio guarda o app e o backend juntos. Sem o filtro, um commit que so
    # mexe numa tela do React Native reconstruiria e reiniciaria a API em producao.
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-spendr-api
  cancel-in-progress: false

# Config nao-secreta mora aqui, versionada e revisavel num diff. Cada step SSH so precisa
# reencaminhar o que usa.
env:
  API_PORT: 3009
  HOST_PORT: 3012
  POSTGRES_USER: spendr_user
  POSTGRES_DB: spendr_db
  ACCESS_TOKEN_TTL: 15m
  REFRESH_TOKEN_DAYS: 30
  SYNC_PAGE_SIZE: 500
  CORS_ORIGINS: ''
  PUBLIC_URL: https://api-finance.valtre.com.br

# Cada step e uma chamada SSH de uma linha so. A logica de verdade mora em
# backend/scripts/deploy.sh, versionada no repo e executada por um bash de verdade na VM:
# scripts multi-linha embutidos no YAML sao corrompidos no transporte do ssh-action
# (blocos { ...; } e case/;; viram "syntax error near ;"). Uma linha unica sobrevive.
#
# Splitar em steps tambem responde "onde quebrou?": o step vermelho no painel do Actions
# aponta a etapa exata.
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronizar codigo na VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          # `git reset --hard` descarta qualquer edicao feita a mao na VM, de proposito:
          # o que vale e o que esta no repo. Troque por `git pull --ff-only` se algum dia
          # precisar preservar ajustes locais.
          script: cd ~/spendr && git fetch origin main && git reset --hard origin/main

      - name: Validar segredos
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          envs: JWT_SECRET,POSTGRES_PASSWORD
          script: cd ~/spendr/backend && bash scripts/deploy.sh check-secrets
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      - name: Escrever .env
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          envs: API_PORT,POSTGRES_USER,POSTGRES_DB,ACCESS_TOKEN_TTL,REFRESH_TOKEN_DAYS,SYNC_PAGE_SIZE,CORS_ORIGINS,JWT_SECRET,POSTGRES_PASSWORD
          script: cd ~/spendr/backend && bash scripts/deploy.sh write-env
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

      - name: Build e subir containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          # Um build do zero pode passar dos 10 min padrao do ssh-action.
          command_timeout: 20m
          script: cd ~/spendr/backend && bash scripts/deploy.sh up

      - name: Aguardar a API (health interno)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          # HOST_PORT vem do bloco `env:` no topo; o `envs:` so o reencaminha pela sessao.
          envs: HOST_PORT
          script: cd ~/spendr/backend && bash scripts/deploy.sh wait-health

      - name: Verificar pelo dominio publico
        # Confirma o caminho inteiro -- DNS, nginx, TLS e API --, do runner, nao so o
        # localhost da VM. Um deploy que so funciona por dentro nao serve para o app.
        run: |
          for tentativa in $(seq 1 10); do
            if curl -fsS "${PUBLIC_URL}/health"; then
              echo
              echo "Deploy confirmado em ${PUBLIC_URL}"
              exit 0
            fi
            sleep 3
          done
          echo "ERRO: a API nao respondeu em ${PUBLIC_URL}/health"
          exit 1
